<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MIRL Aftermath · a condition dossier for damaged heritage</title>
<meta name="description" content="Turn a folder of loose before-and-after photographs into a standardized, court- and UNESCO-ready condition dossier: a site, the events that harmed it, and dated assessments, each a condition report with a before and after photograph aligned so the change reads cleanly. A no-build tool from the Material / Image Research Lab, UCSB.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app">
  <div class="plate">
    <h1>MIRL&nbsp;Aftermath</h1>
    <span class="tag">a condition dossier for damaged heritage</span>
  </div>
  <a class="lab" href="https://mirl.arthistory.ucsb.edu" target="_blank" rel="noopener">Material&nbsp;/&nbsp;Image Research Lab<span class="uni">University of California, Santa&nbsp;Barbara</span></a>
</header>

<nav class="folio">
  <div class="views">
    <button class="view on" data-view="site"><span class="fol">S-01</span>Site</button>
    <button class="view" data-view="schedule"><span class="fol">S-02</span>Schedule</button>
    <button class="view" data-view="assessment"><span class="fol">S-03</span>Assessment</button>
  </div>
  <div class="tools">
    <button class="btn" id="new-assessment-btn" title="Begin a new assessment">New assessment</button>
    <div class="menu-wrap">
      <button class="btn" id="project-btn">Dossier &#9662;</button>
      <div class="menu hidden" id="project-menu">
        <button data-act="save">Save dossier (.json)<small>your full working file; restricted photographs stay in it</small></button>
        <button data-act="open">Open dossier (.json)</button>
        <hr>
        <button data-act="new">New dossier<small>start empty</small></button>
        <button data-act="sample">Open the sample dossier<small>a fictional damaged chapel, for trying things</small></button>
      </div>
    </div>
    <div class="menu-wrap">
      <button class="btn" id="export-btn">Export &#9662;</button>
      <div class="menu hidden" id="export-menu">
        <button data-act="print">Print the dossier (PDF)<small>cover, site summary, numbered figures, and a sources appendix</small></button>
        <button data-act="html">Dossier as one HTML file<small>self-contained, fonts included; for a website or a USB stick</small></button>
        <button data-act="json">Public data (.json)<small>consent applied: restricted photographs and unsafe coordinates withheld</small></button>
        <hr>
        <button data-act="printview">Print this sheet</button>
      </div>
    </div>
  </div>
</nav>

<main>
  <section class="view" id="view-site"></section>
  <section class="view hidden" id="view-schedule"></section>
  <section class="view hidden" id="view-assessment"></section>
</main>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*" class="sr">
<input type="file" id="project-input" accept="application/json,.json" class="sr">

<script src="js/homography.js"></script>
<script src="js/model.js"></script>
<script src="js/figure.js"></script>
<script src="js/sheets.js"></script>
<script src="js/exporters.js"></script>
<script src="samples/sample-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
